<!DOCTYPE html>
<html lang="en">
<head>
    <title>404 - Page Not Found | BitCraft</title>
    <meta name="title" content="404 - Page Not Found"/>
    <meta name="robots" content="index,follow"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="language" content="English"/>
    <meta name="author" content="BitCraft Production"/>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #0f172a;
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: #0f172a;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .home-button {
            background-color: #0f172a;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .home-button:hover {
            background-color: #0056b3;
        }

        footer {
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 0.8;
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 6rem;
            }

            .error-message {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="https://bitcraftproduction.com" class="navbar-brand">BitCraft</a>
    </nav>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-message">Oops! Page Not Found</h1>
        <p class="mb-8 text-gray-600">The page you're looking for doesn't exist or has been moved.</p>
        <a href="https://bitcraftproduction.com" class="home-button">Return Home</a>
    </div>

    <footer>
        <div>&copy; 2024 BitCraft Production. All rights reserved.</div>
        <a href="https://bitcraftproduction.com" >About Us</a>
        <a href="#" >Contact Us</a>
        <a href="#" >Disclaimer</a>
        <a href="#" >Privacy-Policy</a>
    </footer>
</body>
</html>
