<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoTickr - Team Task Management Made Easy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            line-height: 1.6;
        }

        /* Navigation Styles */
        .navbar {
            background-color: #007BFF;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            position: relative;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
        }

        .navbar-logo img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }

        .navbar-logo h1 {
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #FFA726;
        }

        
        .download-btn {
            background-color: #FFA726; /* White background for the button */
            color: #007BFF; 
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            border: 2px solid #007BFF; /* Blue border */
            font-weight: bold;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .download-btn a{
            color:blue;
        }

        .download-btn:hover {
            background-color: #007BFF; /* Blue background on hover */
            color: white; /* White text on hover */
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            z-index: 100;
        }

        .bar {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 3px 0;
            transition: 0.4s;
        }

        /* Mobile Responsive */
        @media screen and (max-width: 768px) {
            .nav-links {
                position: fixed;
                right: -100%;
                top: 0;
                flex-direction: column;
                background-color: #007BFF;
                width: 100%;
                height: 100vh;
                justify-content: center;
                align-items: center;
                transition: right 0.3s ease-in-out;
                z-index: 50;
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                margin: 20px 0;
                font-size: 1.5rem;
            }

            .hamburger {
                display: flex;
            }

            .hamburger.active .bar:nth-child(1) {
                transform: rotate(-45deg) translate(-5px, 6px);
            }

            .hamburger.active .bar:nth-child(2) {
                opacity: 0;
            }

            .hamburger.active .bar:nth-child(3) {
                transform: rotate(45deg) translate(-5px, -6px);
            }
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            padding: 4rem 5%;
            gap: 2rem;
        }

        .hero-content {
            flex: 1;
        }

        .hero-image {
            flex: 1;
            position: relative;
        }

        .hero-image img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .hero-title {
            color: #3483dd;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
        }

        .cta-btn {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .primary-btn {
            background-color: #3483dd;
            color: white;
        }

        .secondary-btn {
            border: 2px solid #3483dd;
            color: #3483dd;
        }

        /* Responsive adjustments */
        @media screen and (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
            }

            .cta-buttons {
                justify-content: center;
            }

            .hero-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <nav class="navbar">
        <div class="navbar-logo">
            <!-- <img src="/api/placeholder/50/50" alt="CoTickr Logo"> -->
            <h1>CoTickr</h1>
        </div>

        <div class="hamburger">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a>
            <a href="#download" class="download-btn" style="background-color: white;color: #3483dd;">Download</a>
        </div>
    </nav>

    <main>
        <section class="container mx-auto px-4 py-16">
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
                <h2 class="text-3xl font-bold mb-8 text-blue-900 text-center">Contact Us</h2>
                
                <form id="contact-form" class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                        <input type="text" id="name" name="name" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                        <input type="text" id="title" name="title" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                        <textarea id="message" name="message" rows="4" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
                    </div>

                    <div>
                        <button type="submit"
                            class="w-full bg-blue-600 text-white py-3 px-6 rounded-md hover:bg-blue-700 transition duration-300">
                            Send Message
                        </button>
                    </div>
                </form>

                <!-- Alert Messages -->
                <div id="success-alert" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-md">
                    Message sent successfully!
                </div>
                <div id="error-alert" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-md">
                    An error occurred. Please try again.
                </div>
            </div>
        </section>

        <!-- EmailJS SDK -->
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
        <script>
            (function() {
                // Initialize EmailJS with your public key
                emailjs.init("YOUR_PUBLIC_KEY");

                document.getElementById('contact-form').addEventListener('submit', function(event) {
                    event.preventDefault();

                    const successAlert = document.getElementById('success-alert');
                    const errorAlert = document.getElementById('error-alert');
                    
                    // Hide any existing alerts
                    successAlert.classList.add('hidden');
                    errorAlert.classList.add('hidden');

                    // Prepare template parameters
                    const templateParams = {
                        to_email: 'bitcraftproduction@gmail.com',
                        from_name: document.getElementById('name').value,
                        from_email: document.getElementById('email').value,
                        title: document.getElementById('title').value,
                        message: document.getElementById('message').value
                    };

                    // Send email using EmailJS
                    emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                        .then(function() {
                            successAlert.classList.remove('hidden');
                            document.getElementById('contact-form').reset();
                        }, function(error) {
                            errorAlert.classList.remove('hidden');
                            console.error('Email sending failed:', error);
                        });
                });
            })();
        </script>
    </main>

    <footer class="bg-gray-900 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 CoTickr. All rights reserved.</p>
            <div class="mt-4 space-x-4">
                <a href="#" class="hover:text-blue-300">Privacy Policy</a>
                <a href="#" class="hover:text-blue-300">Terms of Service</a>
                <a href="#" class="hover:text-blue-300">Contact Us</a>
            </div>
        </div>
    </footer>

    <script>
        // Hamburger Menu Toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close mobile menu when a link is clicked
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });
    </script>
</body>
</html>
